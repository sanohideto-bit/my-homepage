<!DOCTYPE html>
<html lang="ja">
<head>

    <style>

            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-in {
            animation: fade-in 0.5s ease-out forwards;

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icon Components (Lucide React Replacement) ---
        // 外部ライブラリなしで動くようにSVGコンポーネントを定義
        const IconBase = ({ size = 24, className = "", children, ...props }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
                {...props}
            >
                {children}
            </svg>
        );

        const Hammer = (props) => (
            <IconBase {...props}>
                <path d="m15 12-8.5 8.5c-.83.83-2.17.83-3 0 0 0 0 0 0 0a2.12 2.12 0 0 1 0-3L12 9" />
                <path d="M17.64 15 22 10.64" />
                <path d="m20.91 11.7-1.25-1.25c-.6-.6-.93-1.4-.93-2.25V7.86c0-.55-.45-1-1-1H14.5c-.85 0-1.65-.33-2.25-.93L11 4.71" />
                <path d="M6.08 6.08a4 4 0 0 0 3.75 3.75" />
            </IconBase>
        );

        const FileText = (props) => (
            <IconBase {...props}>
                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" x2="8" y1="13" y2="13" />
                <line x1="16" x2="8" y1="17" y2="17" />
                <line x1="10" x2="8" y1="9" y2="9" />
            </IconBase>
        );

        const Users = (props) => (
            <IconBase {...props}>
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </IconBase>
        );

        const Bot = (props) => (
            <IconBase {...props}>
                <path d="M12 8V4H8" />
                <rect width="16" height="12" x="4" y="8" rx="2" />
                <path d="M2 14h2" />
                <path d="M20 14h2" />
                <path d="M15 13v2" />
                <path d="M9 13v2" />
            </IconBase>
        );

        const ArrowRight = (props) => (
            <IconBase {...props}>
                <path d="M5 12h14" />
                <path d="m12 5 7 7-7 7" />
            </IconBase>
        );

        const ArrowDown = (props) => (
            <IconBase {...props}>
                <path d="M12 5v14" />
                <path d="m19 12-7 7-7-7" />
            </IconBase>
        );

        const Mail = (props) => (
            <IconBase {...props}>
                <rect width="20" height="16" x="2" y="4" rx="2" />
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
            </IconBase>
        );

        const CheckCircle = (props) => (
            <IconBase {...props}>
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                <polyline points="22 4 12 14.01 9 11.01" />
            </IconBase>
        );

        const HardHat = (props) => (
            <IconBase {...props}>
                <path d="M10 10V5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v5" />
                <path d="M14 6a6 6 0 0 1 6 6v3" />
                <path d="M4 15v-3a6 6 0 0 1 6-6" />

        );

        const Clock = (props) => (
            <IconBase {...props}>
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
            </IconBase>
        );

        const TrendingUp = (props) => (
            <IconBase {...props}>
                <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" />
                <polyline points="16 7 22 7 22 13" />
            </IconBase>
        );

        const Menu = (props) => (

                <line x1="4" x2="20" y1="6" y2="6" />

        const X = (props) => (
            <IconBase {...props}>
                <path d="M18 6 6 18" />
                <path d="m6 6 12 12" />
            </IconBase>
        );

        const Loader2 = (props) => (
            <IconBase {...props}>
                <path d="M21 12a9 9 0 1 1-6.219-8.56" />
            </IconBase>
        );


        // --- Main App Component ---
        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            
            // フォームの状態管理
            const [formData, setFormData] = useState({
                company: '',
                name: '',
                email: '',
                message: ''
            });
            
            // 送信ステータスの管理 (idle, submitting, success, error)
            const [submitStatus, setSubmitStatus] = useState('idle');

            const toggleMenu = () => setIsMenuOpen(!isMenuOpen);

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                }
                setIsMenuOpen(false);
            };

            // フォーム入力のハンドリング
            const handleInputChange = (e) => {
                const { id, value } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [id]: value
                }));
            };

            // ▼▼▼ Formspreeへの送信処理 ▼▼▼
            const handleDirectSend = async (e) => {
                e.preventDefault();
                setSubmitStatus('submitting');

                try {
                    const response = await fetch("https://formspree.io/f/xvgerrdg", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Accept": "application/json"
                        },
                        body: JSON.stringify(formData)
                    });

                    if (response.ok) {
                        // 送信成功時
                        setSubmitStatus('success');
                        setFormData({ company: '', name: '', email: '', message: '' });
                    } else {
                        // サーバー側のエラー
                        alert("送信に失敗しました。時間をおいて再度お試しください。");
                        setSubmitStatus('idle');
                    }
                } catch (error) {
                    // ネットワークエラーなど
                    alert("送信エラーが発生しました。通信環境をご確認ください。");
                    setSubmitStatus('idle');
                }
            };

            return (
                <div className="font-sans text-gray-800 bg-white">

                                </div>

                                    <button onClick={() => scrollToSection('about')} className="text-gray-600 hover:text-blue-600 font-medium transition-colors">選ばれる理由</button>
                                    <button

                                    >
                                        <Mail className="w-4 h-4 mr-2" />
                                        お問い合わせ
                                    </button>
                                </div>

                                {/* Mobile Menu Button */}
                                <div className="md:hidden flex items-center">
                                    <button onClick={toggleMenu} className="text-gray-600 hover:text-blue-600 focus:outline-none p-2">
                                        {isMenuOpen ? <X size={24} /> : <Menu size={24} />}
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Mobile Menu */}
                        {isMenuOpen && (
                            <div className="md:hidden bg-white border-t border-gray-100 absolute w-full shadow-lg">
                                <div className="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                                    <button onClick={() => scrollToSection('problems')} className="block w-full text-left px-3 py-3 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-md font-medium transition-colors">課題</button>
                                    <button onClick={() => scrollToSection('services')} className="block w-full text-left px-3 py-3 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-md font-medium transition-colors">サービス</button>
                                    <button onClick={() => scrollToSection('about')} className="block w-full text-left px-3 py-3 text-gray-600 hover:text-blue-600 hover:bg-gray-50 rounded-md font-medium transition-colors">選ばれる理由</button>
                                    <button onClick={() => scrollToSection('contact')} className="block w-full text-left px-3 py-3 text-blue-600 font-bold hover:bg-blue-50 rounded-md transition-colors">お問い合わせ</button>
                                </div>
                            </div>
                        )}
                    </nav>

                    {/* Hero Section */}
                    <section className="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden">

                            <div className="absolute inset-0 opacity-10" style={{ backgroundImage: 'radial-gradient(#ffffff 1px, transparent 1px)', backgroundSize: '30px 30px' }}></div>
                        </div>

                        <div className="relative z-10 max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 text-center lg:text-left">

                                <div className="lg:w-1/2 mb-12 lg:mb-0">
                                    <div className="inline-block px-4 py-1 mb-6 rounded-full bg-blue-500/20 border border-blue-400/30 backdrop-blur-sm">
                                        <span className="text-blue-200 font-medium text-sm tracking-wide">建設業特化型DX・自立型組織構築支援</span>
                                    </div>
                                    <h1 className="text-4xl lg:text-5xl font-bold text-white leading-tight mb-6 drop-shadow-sm">
                                        「外注」から「自走」へ。<br />
                                        建設会社の事務と経営を、<br />
                                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-200 to-cyan-300">
                                            自分たちの手に取り戻す。
                                        </span>
                                    </h1>
                                    <p className="text-lg text-slate-300 mb-8 leading-relaxed max-w-2xl mx-auto lg:mx-0">
                                        建築設計監理・現場監督歴17年の一級建築士が提案する、<br className="hidden sm:block" />
                                        「AI事務員」と「デジタル情報整理」による組織変革。<br />
                                        社長が現場作業と深夜の事務から解放され、<br className="hidden sm:block" />
                                        強い組織を作るための最短ルートを施工します。
                                    </p>
                                    <div className="flex flex-col sm:flex-row justify-center lg:justify-start gap-4">
                                        <button 
                                            onClick={() => scrollToSection('contact')}
                                            className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-lg font-bold text-lg transition duration-300 shadow-lg shadow-blue-900/50 flex items-center justify-center group"
                                        >
                                            無料相談・デモ体験はこちら
                                            <ArrowRight className="ml-2 w-5 h-5 group-hover:translate-x-1 transition-transform" />
                                        </button>
                                    </div>
                                </div>
                                <div className="lg:w-5/12 flex justify-center lg:justify-end">
                                    <div className="relative bg-gradient-to-tr from-slate-800 to-slate-700 rounded-2xl p-6 shadow-2xl border border-slate-600 w-full max-w-md transform hover:scale-[1.02] transition-transform duration-500">
                                        <div className="absolute -top-4 -right-4 bg-yellow-500 text-slate-900 font-bold px-4 py-2 rounded-lg shadow-lg transform rotate-3 z-10 flex items-center gap-1">
                                            <HardHat size={16} className="text-slate-900"/> 現場のプロが監修
                                        </div>
                                        <div className="space-y-4">
                                            <div className="bg-slate-900/50 p-5 rounded-lg border-l-4 border-blue-500">

                                            </div>
                                            <div className="flex justify-center py-2">
                                                <ArrowDown className="text-slate-400 w-6 h-6 animate-bounce" />
                                            </div>
                                            <div className="bg-blue-900/30 p-5 rounded-lg border-l-4 border-yellow-500 relative overflow-hidden">

                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Problems Section */}

                            <div className="text-center mb-16">
                                <h2 className="text-3xl font-bold text-slate-900 mb-4">こんな「板挟み」に悩んでいませんか？</h2>
                                <div className="w-16 h-1 bg-blue-600 mx-auto rounded-full"></div>
                            </div>
                            
                            <div className="grid md:grid-cols-2 gap-8">
                                <div className="bg-white p-8 rounded-xl shadow-sm border border-gray-100 hover:shadow-lg transition duration-300 group">
                                    <div className="bg-red-50 w-14 h-14 rounded-full flex items-center justify-center mb-6 group-hover:bg-red-100 transition-colors">
                                        <Clock className="w-7 h-7 text-red-600" />
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-900 mb-3 group-hover:text-blue-700 transition-colors">終わらない「時間貧乏」</h3>
                                    <p className="text-gray-600 leading-relaxed">
                                        日中は現場に出ているため、見積書や日報、近隣挨拶のチラシ作成は全て夜間に。社長自身の休む時間が全く取れていない。
                                    </p>
                                </div>
                                
                                <div className="bg-white p-8 rounded-xl shadow-sm border border-gray-100 hover:shadow-lg transition duration-300 group">

                                    </p>
                                </div>
                                
                                <div className="bg-white p-8 rounded-xl shadow-sm border border-gray-100 hover:shadow-lg transition duration-300 group">
                                    <div className="bg-red-50 w-14 h-14 rounded-full flex items-center justify-center mb-6 group-hover:bg-red-100 transition-colors">

                                        社員が増えても「言った言わない」のトラブルが多発。情報が整理されておらず、結局社長が指示を出さないと現場が回らない。

                                        <p className="text-xl font-bold text-slate-700">で解決できます。</p>
                                    </div>
                                </div>

                                    <div className="relative">

                                        <div className="relative bg-slate-900 rounded-2xl p-8 md:p-10 text-white overflow-hidden shadow-xl">
                                            <Bot className="w-40 h-40 text-slate-800 absolute -bottom-6 -right-6 opacity-80" />
                                            <h3 className="text-2xl md:text-3xl font-bold mb-6 text-yellow-400 flex items-center gap-3">
                                                <Bot size={32} />
                                                建設現場に「魔法の事務員」を
                                            </h3>
                                            <p className="mb-8 leading-relaxed text-slate-300 text-lg">

                                                スマホに向かって現場の状況を話すだけ。<br/>
                                                AIがあなたの代わりに、丁寧な挨拶文や日報、報告メールを一瞬で作成します。
                                            </p>
                                            <div className="flex flex-col sm:flex-row gap-4 sm:items-center text-sm font-bold text-blue-200 bg-slate-800/50 p-4 rounded-lg backdrop-blur-sm">
                                                <span className="flex items-center"><CheckCircle className="w-5 h-5 mr-2 text-green-400" /> 音声入力対応</span>
                                                <span className="hidden sm:block text-slate-600">|</span>
                                                <span className="flex items-center"><CheckCircle className="w-5 h-5 mr-2 text-green-400" /> スマホ完結</span>
                                                <span className="hidden sm:block text-slate-600">|</span>

                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="lg:w-1/2">
                                    <div className="inline-block px-3 py-1 bg-blue-100 text-blue-700 font-bold rounded-full text-xs tracking-wider mb-4">CONCEPT</div>
                                    <h2 className="text-3xl lg:text-4xl font-bold text-slate-900 mb-6 leading-tight">
                                        魚を与えるのではなく、<br/>
                                        <span className="text-blue-600 bg-blue-50 px-2 rounded">「釣り方」</span>を教える支援。
                                    </h2>
                                    <p className="text-lg text-gray-600 mb-8 leading-relaxed">
                                        一時的な代行業務ではありません。<br/>
                                        まずはAIで「時間」を作り、次に内製化で「売上」を作る。そしてGoogle Workspaceで「組織」を整える。<br/><br/>
                                        最終的には、外部業者に依存せず、社員一人ひとりが自律的に判断できる「強い建設会社」への変革をサポートします。
                                    </p>
                                    <div className="flex items-center gap-2 text-slate-800 font-bold">

                    {/* Services Section */}
                    <section id="services" className="py-24 bg-slate-50">
                        <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-16">
                                <span className="text-blue-600 font-bold tracking-wider uppercase text-sm bg-blue-100 px-3 py-1 rounded-full">Roadmap</span>
                                <h2 className="text-3xl md:text-4xl font-bold text-slate-900 mt-4 mb-4">3段階の「自走化」プログラム</h2>
                                <p className="text-gray-600 text-lg">企業の成長フェーズに合わせた、無駄のないステップアップ</p>
                            </div>

                            <div className="grid md:grid-cols-3 gap-8">
                                {/* Step 1 */}
                                <div className="bg-white rounded-xl shadow-lg border-t-4 border-blue-500 overflow-hidden group hover:-translate-y-2 transition duration-300 flex flex-col h-full">
                                    <div className="p-8 flex-grow relative">
                                        <div className="text-6xl font-black text-slate-200 absolute right-4 top-4 select-none group-hover:text-blue-100 transition-colors pointer-events-none">01</div>

                                            <div className="inline-block p-2 bg-blue-100 rounded-lg mb-4 text-blue-600">
                                                <Bot size={24} />
